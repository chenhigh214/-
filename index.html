<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>青竹汉字书写系统</title>

<script src="https://unpkg.com/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>

<style>
:root{
    --bamboo-green:#5a7d61;
    --paper-green:#f2f7f3;
    --ink-color:#333;
    --soft-green:#dce6dd;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    touch-action:manipulation;
}

body{
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    background:#e9ede9;
    color:var(--ink-color);
    display:flex;
    justify-content:center;
    min-height:100vh;
    overscroll-behavior:none;
}

.container{
    width:100%;
    max-width:700px;
    background:var(--paper-green);
    min-height:100vh;
    padding:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.hidden{
    display:none !important;
}

.text-center{
    text-align:center;
}

.btn{
    padding:12px 20px;
    border-radius:8px;
    border:1px solid var(--bamboo-green);
    background:#fff;
    color:var(--bamboo-green);
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

.btn:active{
    transform:scale(.96);
}

.btn-fill{
    background:var(--bamboo-green);
    color:#fff;
}

input,textarea{
    width:100%;
    border:1px solid #ccc;
    border-radius:8px;
    padding:12px;
    font-size:16px;
    margin-top:10px;
    background:#fff;
}

.task-card{
    background:#fff;
    border:1px solid var(--soft-green);
    border-radius:12px;
    padding:16px;
    margin-top:18px;
}

.task-title{
    font-size:20px;
    color:var(--bamboo-green);
    font-weight:bold;
}

.student-list{
    margin-top:15px;
    border-top:1px dashed #ddd;
    padding-top:12px;
}

.student-item{
    background:#f8faf8;
    border-radius:8px;
    padding:10px;
    margin-top:8px;
    font-size:14px;
    line-height:1.8;
}

.header-info{
    margin-bottom:15px;
}

.progress-bar-bg{
    width:100%;
    height:6px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
    margin-top:5px;
}

.progress-bar-fill{
    height:100%;
    width:0%;
    background:var(--bamboo-green);
    transition:.3s;
}

.pinyin-area{
    height:50px;
    font-size:40px;
    font-weight:800;
    color:var(--bamboo-green);
    margin-bottom:10px;
}

.writer-box{
    width:300px;
    height:300px;
    margin:0 auto;
    background:#fff;
    border:2px solid var(--bamboo-green);
    border-radius:10px;
    position:relative;
    overflow:hidden;
}

.grid-overlay{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:1;
    background-image:
    linear-gradient(to right,#e8ede9 1px,transparent 1px),
    linear-gradient(to bottom,#e8ede9 1px,transparent 1px),
    linear-gradient(45deg,transparent 49.5%,#e8ede9 50%,transparent 50.5%),
    linear-gradient(-45deg,transparent 49.5%,#e8ede9 50%,transparent 50.5%);
    background-size:50% 50%,50% 50%,100% 100%,100% 100%;
}

#writer-target{
    width:100%;
    height:100%;
    position:absolute;
    inset:0;
    z-index:2;
}

.flex-btn{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-top:20px;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:100;
    padding:20px;
}

.modal-box{
    background:#fff;
    border-radius:12px;
    padding:30px;
    width:100%;
    max-width:420px;
    text-align:center;
}

@media(max-width:400px){
    .writer-box{
        width:260px;
        height:260px;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- 首页 -->
    <div id="view-home" class="text-center">

        <h2 style="color:var(--bamboo-green);margin-top:50px;">
            青竹汉字教学系统
        </h2>

        <p style="margin:30px 0;color:#888;">
            请通过教师分享的链接进入练习
        </p>

        <button class="btn" onclick="openAdminLogin()">
            教师管理入口
        </button>

    </div>

    <!-- 教师端 -->
    <div id="view-admin" class="hidden">

        <h2 style="color:var(--bamboo-green);margin-bottom:15px;">
            教师管理后台
        </h2>

        <textarea
            id="task-input"
            placeholder="输入练习汉字，例如：你好中国">
        </textarea>

        <button
            class="btn btn-fill"
            style="width:100%;margin-top:12px;"
            onclick="addNewTask()">
            发布练习
        </button>

        <div id="task-list-container"></div>

        <button
            class="btn"
            style="width:100%;margin-top:20px;border:none;"
            onclick="location.reload()">
            退出登录
        </button>

    </div>

    <!-- 学生端 -->
    <div id="view-student" class="hidden text-center">

        <!-- 登记 -->
        <div id="stu-info-form">

            <h2 style="color:var(--bamboo-green);margin-bottom:20px;">
                学生登记
            </h2>

            <input id="stu-name" type="text" placeholder="学生姓名" />
            <input id="stu-class" type="text" placeholder="班级，例如：2A" />

            <button
                class="btn btn-fill"
                style="width:100%;margin-top:10px;"
                onclick="startPractice()">
                开始练习
            </button>

        </div>

        <!-- 练习区 -->
        <div id="practice-area" class="hidden">

            <div class="header-info">

                <div id="progress-text"></div>

                <div class="progress-bar-bg">
                    <div id="progress-bar" class="progress-bar-fill"></div>
                </div>

            </div>

            <div id="pinyin-display" class="pinyin-area"></div>

            <div
                id="step-label"
                style="font-size:14px;color:#666;margin-bottom:10px;">
            </div>

            <div class="writer-box">

                <div class="grid-overlay"></div>

                <div id="writer-target"></div>

            </div>

            <div class="flex-btn">

                <button
                    id="btn-replay"
                    class="btn"
                    onclick="replayCharacter()">
                    重播演示
                </button>

                <button
                    id="btn-next"
                    class="btn btn-fill hidden"
                    onclick="goToNextStep()">
                    下一步
                </button>

            </div>

        </div>

    </div>

</div>

<!-- 成绩弹窗 -->
<div id="result-modal" class="modal hidden">

    <div class="modal-box">

        <h2 style="color:var(--bamboo-green);">
            练习完成 🎉
        </h2>

        <div
            id="result-stat"
            style="margin:20px 0;text-align:left;line-height:2;">
        </div>

        <button
            class="btn btn-fill"
            style="width:100%;"
            onclick="location.reload()">
            提交成绩并关闭
        </button>

    </div>

</div>

<script>

/* 本地数据库 */
const DB_TASKS = 'HANZI_TASKS_V6';
const DB_SCORES = 'HANZI_SCORES_V6';

let tasks = JSON.parse(localStorage.getItem(DB_TASKS) || '[]');
let scores = JSON.parse(localStorage.getItem(DB_SCORES) || '[]');

/* 状态 */
let currentTask = null;
let writerInstance = null;

let charIdx = 0;
let stepIdx = 0;

let totalMistakes = 0;
let wordMistakes = 0;

/* 初始化 */
window.onload = () => {

    const tid = new URLSearchParams(location.search).get('taskID');

    if(tid){

        currentTask = tasks.find(t => t.id === tid);

        if(currentTask){

            showView('view-student');

        }else{

            alert('任务不存在');
            showView('view-home');

        }

    }else{

        showView('view-home');

    }

};

/* 页面切换 */
function showView(id){

    document.querySelectorAll('.container > div')
    .forEach(v => v.classList.add('hidden'));

    document.getElementById(id)
    .classList.remove('hidden');

}

/* 教师登录 */
function openAdminLogin(){

    const pw = prompt('请输入教师密码');

    if(pw === '1998'){

        showView('view-admin');
        renderAdminTasks();

    }else if(pw !== null){

        alert('密码错误');

    }

}

/* 发布任务 */
function addNewTask(){

    const input = document.getElementById('task-input')
    .value
    .trim();

    if(!input){

        alert('请输入汉字');
        return;

    }

    const chars = input
    .split('')
    .filter(c => /[\u4e00-\u9fa5]/.test(c));

    if(chars.length === 0){

        alert('请输入有效汉字');
        return;

    }

    const task = {

        id:'T' + Date.now().toString(36).toUpperCase(),
        chars,
        date:new Date().toLocaleString()

    };

    tasks.push(task);

    localStorage.setItem(DB_TASKS, JSON.stringify(tasks));

    document.getElementById('task-input').value = '';

    renderAdminTasks();

}

/* 渲染教师后台 */
function renderAdminTasks(){

    const container = document.getElementById('task-list-container');

    container.innerHTML = tasks
    .slice()
    .reverse()
    .map(task => {

        const taskScores = scores.filter(s => s.tid === task.id);

        const studentHTML = taskScores.length > 0
        ? taskScores.map(s => `
            <div class="student-item">
                <strong>学生：</strong>${s.name}<br>
                <strong>班级：</strong>${s.cls || '-'}<br>
                <strong>成绩：</strong>${s.score} 分<br>
                <strong>提交时间：</strong>${s.time}
            </div>
        `).join('')
        : `<div style="margin-top:10px;color:#999;">暂无学生提交</div>`;

        return `
        <div class="task-card">

            <div class="task-title">
                ${task.chars.join('')}
            </div>

            <div style="margin-top:8px;color:#888;font-size:14px;">
                发布时间：${task.date}
            </div>

            <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;">

                <button
                    class="btn"
                    style="padding:6px 10px;font-size:12px;"
                    onclick="copyLink('${task.id}')">
                    复制学生链接
                </button>

                <button
                    class="btn"
                    style="padding:6px 10px;font-size:12px;color:red;border-color:red;"
                    onclick="deleteTask('${task.id}')">
                    删除
                </button>

            </div>

            <div class="student-list">

                <strong>
                    学生提交记录（${taskScores.length}）
                </strong>

                ${studentHTML}

            </div>

        </div>
        `;

    }).join('');

}

/* 复制链接 */
function copyLink(id){

    const url =
        location.origin +
        location.pathname +
        '?taskID=' + id;

    navigator.clipboard.writeText(url)
    .then(() => {

        alert('学生练习链接已复制');

    });

}

/* 删除任务 */
function deleteTask(id){

    if(confirm('确定删除该作业吗？')){

        tasks = tasks.filter(t => t.id !== id);

        localStorage.setItem(DB_TASKS, JSON.stringify(tasks));

        renderAdminTasks();

    }

}

/* 开始练习 */
function startPractice(){

    const name = document.getElementById('stu-name').value.trim();

    if(!name){

        alert('请输入姓名');
        return;

    }

    document.getElementById('stu-info-form')
    .classList.add('hidden');

    document.getElementById('practice-area')
    .classList.remove('hidden');

    loadCharacterProcess();

}

/* 加载汉字 */
function loadCharacterProcess(){

    const char = currentTask.chars[charIdx];

    stepIdx = 0;
    wordMistakes = 0;

    document.getElementById('progress-text').innerText =
        `练习进度：${charIdx + 1} / ${currentTask.chars.length}`;

    document.getElementById('progress-bar').style.width =
        ((charIdx + 1) / currentTask.chars.length * 100) + '%';

    document.getElementById('pinyin-display').innerText = char;

    initWriterStep();

}

/* 初始化书写 */
function initWriterStep(){

    const char = currentTask.chars[charIdx];

    const nextBtn = document.getElementById('btn-next');
    const replayBtn = document.getElementById('btn-replay');

    document.getElementById('writer-target').innerHTML = '';

    nextBtn.classList.add('hidden');

    const size = window.innerWidth < 400 ? 260 : 300;

    const config = {

        width:size,
        height:size,

        padding:20,

        strokeColor:'#333',
        radicalColor:'#5a7d61',

        drawingWidth:20,
        drawingThreshold:40,

        leniency:1,

        strokeAnimationSpeed:1,
        delayBetweenStrokes:200

    };

    /* 演示 */
    if(stepIdx === 0){

        document.getElementById('step-label').innerText =
            '第一步：观察笔顺演示';

        replayBtn.classList.remove('hidden');

        writerInstance = HanziWriter.create(
            'writer-target',
            char,
            {
                ...config,
                showCharacter:true,
                showOutline:true
            }
        );

        writerInstance.animateCharacter({

            onComplete(){

                nextBtn.innerText = '进入描红';
                nextBtn.classList.remove('hidden');

            }

        });

    }

    /* 描红 */
    else if(stepIdx === 1){

        document.getElementById('step-label').innerText =
            '第二步：请跟着提示描红';

        replayBtn.classList.add('hidden');

        writerInstance = HanziWriter.create(
            'writer-target',
            char,
            {
                ...config,
                showCharacter:true,
                showOutline:true
            }
        );

        writerInstance.quiz({

            onMistake(){

                wordMistakes++;
                totalMistakes++;

            },

            onComplete(){

                nextBtn.innerText = '进入默写';
                nextBtn.classList.remove('hidden');

            }

        });

    }

    /* 默写 */
    else if(stepIdx === 2){

        document.getElementById('step-label').innerText =
            '第三步：请凭记忆默写';

        replayBtn.classList.add('hidden');

        writerInstance = HanziWriter.create(
            'writer-target',
            char,
            {
                ...config,
                showCharacter:false,
                showOutline:false
            }
        );

        writerInstance.quiz({

            onMistake(){

                wordMistakes++;
                totalMistakes++;

            },

            onComplete(){

                charIdx++;

                if(charIdx < currentTask.chars.length){

                    loadCharacterProcess();

                }else{

                    finishPractice();

                }

            }

        });

    }

}

/* 重播 */
function replayCharacter(){

    if(writerInstance){

        writerInstance.animateCharacter();

    }

}

/* 下一步 */
function goToNextStep(){

    stepIdx++;

    initWriterStep();

}

/* 完成练习 */
function finishPractice(){

    const score = Math.max(0, 100 - totalMistakes * 5);

    const name = document.getElementById('stu-name').value;
    const cls = document.getElementById('stu-class').value;

    document.getElementById('result-stat').innerHTML = `
        <strong>学生：</strong>${name}<br>
        <strong>班级：</strong>${cls}<br>
        <strong>成绩：</strong>
        <span style="font-size:26px;color:var(--bamboo-green);">
            ${score} 分
        </span>
    `;

    document.getElementById('result-modal')
    .classList.remove('hidden');

    scores.push({

        tid:currentTask.id,
        name,
        cls,
        score,
        time:new Date().toLocaleString()

    });

    localStorage.setItem(DB_SCORES, JSON.stringify(scores));

}

/* 下一步 */
document.addEventListener('keydown', e => {

    if(e.key === 'Enter'){

        const btn = document.getElementById('btn-next');

        if(!btn.classList.contains('hidden')){

            goToNextStep();

        }

    }

});
</script>

</body>
</html>
